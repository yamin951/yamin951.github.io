<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>YAMIN | Carrito</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo"><img src="Imagenes/YAMIN LOGO METALICO.png" alt="Logo"></div>
        <div class="search-bar">🔍 <input type="text" placeholder="Busca tu producto..."></div>
        <div class="nav-links">
            <a href="index.html">INICIO</a>
            <a href="catalogo.html">CATÁLOGO</a>
            <a href="personalizar.html">PERSONALIZAR</a>
            <a href="carrito.html">CARRITO 🛒</a>
        </div>
    </nav>

    <main class="container" style="max-width: 800px; margin: 0 auto;">
        <h1 class="main-title" style="color:var(--accent-cyan)">CARRITO </h1> 
        
        <div style="background:#333; padding:20px; border-radius:10px; display:flex; align-items:center; gap:20px; margin-bottom:20px; border-left: 5px solid var(--accent-cyan);">
            <img src="Imagenes/Playera Personalizada.jpg" style="width:120px; background:white; border-radius:5px;">
            <div style="flex-grow:1">
                <h2 style="color:var(--accent-cyan); margin:0;">Playera Personalizada</h2>
                <p>$269.00 MXN / Negro / Hombre / XL</p>
            </div>
            <button style="color:red; background:none; border:none; cursor:pointer; font-weight:bold;">Borrar</button>
        </div>

        <div style="background:#004d40; padding:30px; border-radius:10px; text-align:center;">
            <div style="display:flex; justify-content:space-between; font-size:0.9rem;"><span>Subtotal</span><span>$269.00 MXN</span></div>
            <hr style="border:0.5px solid #00695c;">
            <div style="display:flex; justify-content:space-between; font-size:2.5rem; font-weight:bold; margin-top:10px;">
                <span>TOTAL</span><span>$ 269.00 MXN</span>
            </div>
            <p style="font-size:0.8rem; margin-top:20px;">Envío regular: $99.00 MXN | Envío Express: $149.00 MXN</p>
        </div>

        <button style="background:#afb42b; color:black; font-size:1.8rem; font-weight:bold; width:100%; padding:20px; border:none; margin-top:20px; cursor:pointer;">
            🔒 FINALIZAR PEDIDO
        </button>
    </main>
</body>
</html>
