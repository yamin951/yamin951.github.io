<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>YAMIN | Personalizar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <nav>
        <div class="logo"><img src="Imagenes/YAMIN LOGO METALICO.png" alt="Logo"></div>
        <div class="nav-links">
            <a href="index.html">INICIO</a>
            <a href="catalogo.html">CATÁLOGO</a>
            <a href="personalizar.html">PERSONALIZAR</a>
            <a href="carrito.html">CARRITO</a>
        </div>
    </nav>

    <main class="container" style="max-width: 600px; margin: 0 auto; text-align: center;">
        <h1 class="main-title" style="color:var(--accent-cyan)" >PERSONALIZAR</h1>
        <img src="Imagenes/Mockup Yamin.png" class="img-box" style="background:none;">
        <p>Sube tu foto personalizada (opcional)</p>
        <input type="file" style="margin-bottom: 20px;">

        <h3>Selecciona:</h3>
        <button style="background:var(--btn-blue); color:white; border:none; padding:10px 20px; margin:5px;">Playera</button>
        <button style="background:var(--btn-blue); color:white; border:none; padding:10px 20px; margin:5px;">Sudadera</button>
        <button style="background:var(--btn-blue); color:white; border:none; padding:10px 20px; margin:5px;">Taza</button>
        <button style="background:var(--btn-blue); color:white; border:none; padding:10px 20px; margin:5px;">Llavero</button>

        
        <h3>Corte:</h3>
        <button style="background:var(--btn-blue); color:white; border:none; padding:10px 20px; margin:5px;">Hombre</button>
        <button style="background:var(--btn-blue); color:white; border:none; padding:10px 20px; margin:5px;">Mujer</button>

        <h3>Tamaño:</h3>
        <button style="background:var(--btn-blue); color:white; border:none; width:40px; height:40px; margin:5px;">S</button>
        <button style="background:var(--btn-blue); color:white; border:none; width:40px; height:40px; margin:5px;">M</button>
        <button style="background:var(--btn-blue); color:white; border:none; width:40px; height:40px; margin:5px;">L</button>
        <button style="background:var(--btn-blue); color:white; border:none; width:40px; height:40px; margin:5px;">XL</button>
        <button style="background:var(--btn-blue); color:white; border:none; width:40px; height:40px; margin:5px;">XXL</button>
        <button style="background:var(--btn-blue); color:white; border:none; width:40px; height:40px; margin:5px;">XXXL</button>

        <input type="text" placeholder="Tu texto aquí..." style="width:95%; padding:15px; margin:20px 0; background:#555; border:none; color:white; text-align:center;">
        
        <button class="btn-cyan">PREVISUALIZAR</button>
        <p style="color:var(--accent-green); font-size:0.8rem;">Llega en 2 días hábiles con envío express.</p>
        <button class="btn-black">AGREGAR AL CARRITO</button>
    </main>
</body>
</html>
